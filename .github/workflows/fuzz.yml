name: Fuzz Tests

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration per target in seconds'
        required: false
        default: '300'

jobs:
  fuzz:
    runs-on: ubuntu-latest
    env:
      FUZZ_DURATION: ${{ github.event.inputs.duration || '300' }}
      FUZZ_AFL_HOME: AFLplusplus
      AFL_NO_UI: 1
      AFL_SKIP_CPUFREQ: 1
      AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y eatmydata
          sudo eatmydata apt-get install -y \
            build-essential \
            librtlsdr-dev libusb-dev libxml2-dev libxslt1-dev \
            clang llvm gcc-13-plugin-dev

      - name: Configure
        run: eatmydata ./configure

      - name: Cache AFL++
        id: cache-afl
        uses: actions/cache@v5
        with:
          path: AFLplusplus
          key: aflplusplus-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Build AFL++
        if: steps.cache-afl.outputs.cache-hit != 'true'
        run: make afl_prepared

      - name: Mark afl_prepared (cache hit)
        if: steps.cache-afl.outputs.cache-hit == 'true'
        run: touch afl_prepared

      - name: Build fuzz targets
        run: make build_fuzz

      - name: Extract telegram seeds
        run: make extract_fuzz_telegram_seeds

      - name: Fuzz difvifparser (${{ env.FUZZ_DURATION }}s)
        run: |
          mkdir -p fuzz_testcases/difvifparser/findings
          timeout ${{ env.FUZZ_DURATION }} \
            $FUZZ_AFL_HOME/afl-fuzz \
              -i fuzz_testcases/difvifparser \
              -o fuzz_testcases/difvifparser/findings \
              -- build/fuzz_difvifparser \
          || true

      - name: Fuzz formula (${{ env.FUZZ_DURATION }}s)
        run: |
          mkdir -p fuzz_testcases/formula/findings
          timeout ${{ env.FUZZ_DURATION }} \
            $FUZZ_AFL_HOME/afl-fuzz \
              -i fuzz_testcases/formula \
              -o fuzz_testcases/formula/findings \
              -- build/fuzz_formula \
          || true

      - name: Fuzz frames (${{ env.FUZZ_DURATION }}s)
        run: |
          mkdir -p fuzz_testcases/frames/findings
          timeout ${{ env.FUZZ_DURATION }} \
            $FUZZ_AFL_HOME/afl-fuzz \
              -i fuzz_testcases/frames \
              -o fuzz_testcases/frames/findings \
              -- build/fuzz_frames \
          || true

      - name: Fuzz address (${{ env.FUZZ_DURATION }}s)
        run: |
          mkdir -p fuzz_testcases/address/findings
          timeout ${{ env.FUZZ_DURATION }} \
            $FUZZ_AFL_HOME/afl-fuzz \
              -i fuzz_testcases/address \
              -o fuzz_testcases/address/findings \
              -- build/fuzz_address \
          || true

      - name: Fuzz telegrams (${{ env.FUZZ_DURATION }}s)
        run: |
          mkdir -p fuzz_testcases/telegrams/findings
          timeout ${{ env.FUZZ_DURATION }} \
            $FUZZ_AFL_HOME/afl-fuzz \
              -i fuzz_testcases/telegrams \
              -o fuzz_testcases/telegrams/findings \
              -- build/wmbusmeters --listento=any stdin \
          || true

      - name: Check for crashes
        id: check_crashes
        run: |
          count_crashes() { find "$1/findings/default/crashes" -maxdepth 1 -type f 2>/dev/null | wc -l; }
          C_DIFVIF=$(count_crashes fuzz_testcases/difvifparser)
          C_FORMULA=$(count_crashes fuzz_testcases/formula)
          C_FRAMES=$(count_crashes fuzz_testcases/frames)
          C_ADDRESS=$(count_crashes fuzz_testcases/address)
          C_TELEGRAMS=$(count_crashes fuzz_testcases/telegrams)
          TOTAL=$((C_DIFVIF + C_FORMULA + C_FRAMES + C_ADDRESS + C_TELEGRAMS))
          echo "Crashes — difvifparser: $C_DIFVIF, formula: $C_FORMULA, frames: $C_FRAMES, address: $C_ADDRESS, telegrams: $C_TELEGRAMS"
          echo "total_crashes=$TOTAL" >> $GITHUB_OUTPUT
          [ "$TOTAL" -gt 0 ] && echo "has_crashes=true" >> $GITHUB_OUTPUT || echo "has_crashes=false" >> $GITHUB_OUTPUT

      - name: Upload crash artifacts
        if: steps.check_crashes.outputs.has_crashes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ github.sha }}
          path: |
            fuzz_testcases/difvifparser/findings/default/crashes/
            fuzz_testcases/formula/findings/default/crashes/
            fuzz_testcases/frames/findings/default/crashes/
            fuzz_testcases/address/findings/default/crashes/
            fuzz_testcases/telegrams/findings/default/crashes/
          retention-days: 30

      - name: Upload fuzz queues (corpus for future runs)
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-queues-${{ github.sha }}
          path: |
            fuzz_testcases/difvifparser/findings/default/queue/
            fuzz_testcases/formula/findings/default/queue/
            fuzz_testcases/frames/findings/default/queue/
            fuzz_testcases/address/findings/default/queue/
            fuzz_testcases/telegrams/findings/default/queue/
          retention-days: 7

      - name: Fail if crashes found
        if: steps.check_crashes.outputs.has_crashes == 'true'
        run: |
          echo "::error::Fuzzer found ${{ steps.check_crashes.outputs.total_crashes }} crash(es). Download 'fuzz-crashes-${{ github.sha }}' artifact to reproduce."
          exit 1
