<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wmbusmeters</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg:#0a0a0a; --surface:#141414; --border:#252525;
    --text:#b0b8c0; --dim:#555e68; --bright:#e0e4e8;
    --green:#3fb950; --cyan:#58a6ff; --amber:#d29922; --red:#f85149;
    --mono:'IBM Plex Mono','Menlo',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:40px;display:flex;align-items:center;gap:12px;font-size:12px;flex-shrink:0}
.topbar .logo{color:var(--green);font-weight:600;font-size:13px}
.topbar .ver{color:var(--dim);font-weight:400;font-size:11px;margin-left:6px}
.topbar .sep{width:1px;height:20px;background:var(--border)}
.topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--dim)}
.topbar .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.topbar .lbl{color:var(--dim)}
.topbar select,.topbar button{font-family:var(--mono);font-size:11px;padding:3px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;cursor:pointer}
.topbar button:hover{border-color:var(--dim)}
.topbar button.g{border-color:var(--green);color:var(--green)}
.topbar button.g:hover{background:#1a2f1a}
.topbar button:disabled{opacity:.3;cursor:default}

.port-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--cyan)}
.port-tag .port-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.port-tag .port-remove{color:var(--dim);cursor:pointer;margin-left:2px}
.port-tag .port-remove:hover{color:var(--red)}

.terminal{flex:1;overflow-y:auto;padding:12px 16px;font-size:12.5px;line-height:1.65;background:var(--bg)}
.line{padding:1px 0;white-space:pre-wrap;word-break:break-all}
.line.dim{color:var(--dim)} .line.green{color:var(--green)} .line.cyan{color:var(--cyan)}
.line.amber{color:var(--amber)} .line.red{color:var(--red)} .line.bright{color:var(--bright)}

.prompt-wrap{display:flex;align-items:center;gap:0;background:var(--surface);border-top:1px solid var(--border);padding:0 16px;height:32px;flex-shrink:0}
.prompt-wrap .ps{color:var(--green);font-size:12px;white-space:nowrap}
.prompt-wrap input{flex:1;background:transparent;border:none;outline:none;color:var(--bright);font-family:var(--mono);font-size:12px;padding:0 6px}

.statusbar{background:var(--surface);border-top:1px solid var(--border);padding:0 16px;height:24px;display:flex;align-items:center;gap:16px;font-size:10px;color:var(--dim);flex-shrink:0}
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Menu dropdown ──────────────────────────────────── */
.menu-wrap{position:relative}
.menu-btn{font-size:14px;letter-spacing:1px;padding:3px 6px}
.menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;min-width:180px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);overflow:hidden}
.menu.open{display:block}
.menu-item{padding:7px 14px;font-size:11px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:var(--bg);color:var(--bright)}
.menu-item .mi-icon{color:var(--dim);font-size:12px;width:16px;text-align:center}
.menu-item .mi-count{margin-left:auto;color:var(--dim);font-size:10px}

/* ── Dialog overlay ─────────────────────────────────── */
.dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.dialog-overlay.open{display:flex}
.dialog{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:560px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.dialog-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.dialog-header h2{font-size:13px;font-weight:600;color:var(--bright);font-family:var(--mono)}
.dialog-close{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:0 4px;font-family:var(--mono)}
.dialog-close:hover{color:var(--red)}
.dialog-body{flex:1;overflow-y:auto;padding:12px 16px}
.dialog-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ── Form elements ──────────────────────────────────── */
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;font-family:var(--mono);font-size:11px;padding:6px 8px;background:var(--bg);color:var(--bright);border:1px solid var(--border);border-radius:4px;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan)}
.field textarea{resize:vertical;min-height:48px}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
.btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--bg);color:var(--text)}
.btn:hover{border-color:var(--dim);color:var(--bright)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:#1a2f1a}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:#2f1a1a}
.btn-sm{padding:3px 8px;font-size:10px}

/* ── Stored items list ──────────────────────────────── */
.item-list{list-style:none}
.item-card{border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:6px;background:var(--bg);display:flex;align-items:flex-start;gap:10px}
.item-card:hover{border-color:var(--dim)}
.item-info{flex:1;min-width:0}
.item-name{font-size:12px;color:var(--bright);font-weight:500}
.item-meta{font-size:10px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.empty-state{text-align:center;padding:24px;color:var(--dim);font-size:11px}

/* ── Tabs ───────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px}
.tab{padding:6px 14px;font-size:11px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;font-family:var(--mono);background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-panel{display:none}
.tab-panel.active{display:block}
</style>
</head>
<body>

<div class="topbar">
    <span class="logo">wmbusmeters<span class="ver" id="ver"></span></span>
    <div class="sep"></div>
    <div class="dot" id="wasmDot"></div>
    <span class="lbl" id="wasmLbl">loading…</span>
    <div class="sep"></div>
    <button class="g" id="btnAddPort" onclick="addPort()">+ Add Port</button>
    <div id="portTags"></div>
    <div style="margin-left:auto"></div>
    <div class="menu-wrap">
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
        <div class="menu" id="menu">
            <div class="menu-item" onclick="openDialog('meters')">
                <span class="mi-icon">◉</span>Meters<span class="mi-count" id="menuMeterCount">0</span>
            </div>
            <div class="menu-item" onclick="openDialog('commands')">
                <span class="mi-icon">▸</span>Saved Commands<span class="mi-count" id="menuCmdCount">0</span>
            </div>
            <div class="menu-item" onclick="openDialog('notes')">
                <span class="mi-icon">✎</span>Notes<span class="mi-count" id="menuNoteCount">0</span>
            </div>
            <div class="menu-item" onclick="exportAll()">
                <span class="mi-icon">↓</span>Export All
            </div>
            <div class="menu-item" onclick="importAll()">
                <span class="mi-icon">↑</span>Import
            </div>
        </div>
    </div>
</div>

<!-- ── Dialog ──────────────────────────────────────── -->
<div class="dialog-overlay" id="dlgOverlay" onclick="if(event.target===this)closeDialog()">
    <div class="dialog">
        <div class="dialog-header">
            <h2 id="dlgTitle">—</h2>
            <button class="dialog-close" onclick="closeDialog()">×</button>
        </div>
        <div class="dialog-body" id="dlgBody"></div>
        <div class="dialog-footer" id="dlgFooter"></div>
    </div>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)" />

<div class="terminal" id="term"></div>

<div class="prompt-wrap">
    <span class="ps">wmbusmeters$&nbsp;</span>
    <input type="text" id="input" placeholder="e.g. auto:t1  or  --listmeters  or  --help" autofocus />
</div>

<div class="statusbar">
    <span id="sbStatus">ready</span>
    <span id="sbPorts">no ports</span>
</div>

<script src="serial-manager.js"></script>

<script>
// ═══════════════════════════════════════════════════════
// wmbusmeters Web Terminal
//
// "Add Port" registers a WebSerial port.
// Then you type commands exactly like the CLI:
//   auto:t1
//   /dev/ttyWebUSB0:t1 MyMeter multical21 12345678 KEY
//   --listmeters
//   --analyze=...
// wmbusmeters main() uses the registered port(s).
// ═══════════════════════════════════════════════════════

let wasmModule = null, wasmReady = false, wm = {};
let mainRunning = false;

// ── 1. Serial manager (before WASM) ──────────────────
const serialMgr = new SerialCommunicationManagerImp();
serialMgr.registerGlobals();

// ── UI updates on hot-plug/unplug ─────────────────────
let wasRunningOnDisconnect = false;
let lastCommand = '';

serialMgr.addEventListener('portchange', async (e) => {
    const { type, index, dev } = e.detail;
    if (type === 'connect') {
        const info = dev.getInfo();
        const vid = info.usbVendorId ? `VID=0x${info.usbVendorId.toString(16).padStart(4,'0')}` : '';
        const pid = info.usbProductId ? `PID=0x${info.usbProductId.toString(16).padStart(4,'0')}` : '';
        const usb = [vid, pid].filter(Boolean).join(' ');
        print(`Port connected: /dev/ttyWebUSB${index}${usb ? ' (' + usb + ')' : ''}`, 'green');
        renderPortTags();

        // Auto-restart if a session was running before disconnect
        if (wasRunningOnDisconnect && !mainRunning && lastCommand) {
            wasRunningOnDisconnect = false;
            print('Restarting session...', 'cyan');
            await new Promise(r => setTimeout(r, 1000)); // let device settle
            execCommand(lastCommand);
        }
    } else {
        print(`Port disconnected: /dev/ttyWebUSB${index}`, 'amber');
        renderPortTags();

        // Stop the running session so wm_main returns to JS
        if (mainRunning) {
            wasRunningOnDisconnect = true;
            wm.stop(); // safe: just sets running_=false, no ASYNCIFY
        }
    }
});

// ── Terminal ──────────────────────────────────────────
const term = document.getElementById('term');
function print(text, cls) {
    const el = document.createElement('div');
    el.className = 'line' + (cls ? ' ' + cls : '');
    el.textContent = text;
    term.appendChild(el);
    if (term.scrollHeight - term.scrollTop - term.clientHeight < 200)
        term.scrollTop = term.scrollHeight;
}

// ── 2. WASM Init ─────────────────────────────────────
async function initWasm() {
    try {
        const s = document.createElement('script');
        s.src = 'dist/wmbusmeters.js';
        document.head.appendChild(s);
        await new Promise((ok, no) => { s.onload = ok; s.onerror = () => no(new Error('dist/wmbusmeters.js not found')); });

        wasmModule = await WMBusMeters({
            print:    (text) => print(text),
            printErr: (text) => print(text, 'amber'),
        });

        serialMgr.setWasmModule(wasmModule);

        wm.version = wasmModule.cwrap('wm_version', 'string', []);
        wm.main    = wasmModule.cwrap('wm_main', 'number', ['string'], { async: true });
        wm.stop    = wasmModule.cwrap('wm_stop', null, []);

        wasmReady = true;
        const v = wm.version();
        document.getElementById('ver').textContent = ' ' + v;
        document.getElementById('wasmDot').classList.add('on');
        document.getElementById('wasmLbl').textContent = 'ready';

        print(v, 'green');
        print('', 'dim');
        print('Usage:', 'dim');
        print('  1. Click "+ Add Port" to register your wMBus dongle', 'dim');
        print('  2. Type a command below — same syntax as the CLI:', 'dim');
        print('', 'dim');
        print('     auto:t1                              listen on auto-detected device', 'cyan');
        print('     auto:t1 MyMeter multical21 12345678  listen + decode specific meter', 'cyan');
        print('     --listmeters                         list available drivers', 'cyan');
        print('     --listfields=multical21              list fields for a driver', 'cyan');
        print('     --analyze=...                        analyze a hex telegram', 'cyan');
        print('     --help                               full help', 'cyan');
        print('', 'dim');
        print('  Type "stop" to stop a running session.', 'dim');
        print('  Type "clear" to clear the terminal.', 'dim');
        print('', 'dim');

        // Auto-open any previously permitted ports
        const autoOpened = await serialMgr.autoOpenExisting();
        for (const dev of autoOpened) {
            const info = dev.getInfo();
            const vid = info.usbVendorId ? `VID=0x${info.usbVendorId.toString(16).padStart(4,'0')}` : '';
            const pid = info.usbProductId ? `PID=0x${info.usbProductId.toString(16).padStart(4,'0')}` : '';
            const usb = [vid, pid].filter(Boolean).join(' ');
            print(`Port auto-detected: /dev/ttyWebUSB${dev.index}${usb ? ' (' + usb + ')' : ''}`, 'green');
        }
        if (autoOpened.length > 0) {
            print('', 'dim');
            renderPortTags();
        }

    } catch (e) {
        document.getElementById('wasmLbl').textContent = 'error';
        print('WASM load failed: ' + e.message, 'red');
    }
}

// ── Add Port ──────────────────────────────────────────
// Opens the browser serial port dialog.
// The port is registered so wmbusmeters can find it
// via listSerialTTYs() → "ttyWebUSB0" etc.
async function addPort() {
    if (!wasmReady) { print('WASM not ready yet.', 'red'); return; }

    try {
        const baud = 9600; // Default — wmbusmeters will re-open at the right baud during detection
        const dev = await serialMgr.requestAndOpen(baud);
        if (!dev) { print('Failed to open port.', 'red'); return; }

        const info = dev.getInfo();
        const vid = info.usbVendorId ? `VID=0x${info.usbVendorId.toString(16).padStart(4,'0')}` : '';
        const pid = info.usbProductId ? `PID=0x${info.usbProductId.toString(16).padStart(4,'0')}` : '';
        const usb = [vid, pid].filter(Boolean).join(' ');

        print(`Port added: /dev/ttyWebUSB${dev.index}${usb ? ' (' + usb + ')' : ''}`, 'green');
        print(`Use it as: auto:t1  or  /dev/ttyWebUSB${dev.index}:t1`, 'dim');
        print('', 'dim');

        renderPortTags();

    } catch (e) {
        if (e.name === 'NotFoundError') {
            // User cancelled the dialog
        } else {
            print('Port error: ' + e.message, 'red');
        }
    }
}

// ── Remove Port ───────────────────────────────────────
async function removePort(index) {
    if (mainRunning) {
        print('Cannot remove port while running — type "stop" first.', 'amber');
        return;
    }
    await serialMgr.closeByIndex(index);
    print(`Port /dev/ttyWebUSB${index} removed.`, 'dim');
    renderPortTags();
}

// ── Port Tags UI ──────────────────────────────────────
function renderPortTags() {
    const container = document.getElementById('portTags');
    container.innerHTML = '';

    const count = serialMgr.getDeviceCount();
    document.getElementById('sbPorts').textContent = count === 0 ? 'no ports' : count + ' port(s)';

    // Iterate through known devices
    for (let i = 0; i < 10; i++) {
        const dev = serialMgr.findByIndex(i);
        if (!dev || !dev.isOpen) continue;

        const info = dev.getInfo();
        const vid = info.usbVendorId ? info.usbVendorId.toString(16).padStart(4,'0') : '';

        const tag = document.createElement('span');
        tag.className = 'port-tag';
        tag.innerHTML = `<span class="port-dot"></span>/dev/ttyWebUSB${dev.index}${vid ? ' <span style="color:var(--dim)">' + vid + '</span>' : ''}<span class="port-remove" onclick="removePort(${dev.index})">×</span>`;
        container.appendChild(tag);
    }
}

// ── Command Input ─────────────────────────────────────
document.getElementById('input').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const cmd = e.target.value.trim();
    e.target.value = '';
    if (!cmd) return;

    if (cmd === 'clear') { term.innerHTML = ''; return; }
    if (cmd === 'stop') {
        if (mainRunning) { lastCommand = ''; wm.stop(); print('Stopping...', 'amber'); }
        else print('Nothing running.', 'dim');
        return;
    }

    execCommand(cmd);
});

async function execCommand(cmd) {
    print('$ wmbusmeters ' + cmd, 'bright');

    if (!wasmReady) { print('WASM not loaded yet.', 'red'); return; }
    if (mainRunning) { print('Already running — type "stop" first.', 'amber'); return; }

    lastCommand = cmd;
    mainRunning = true;
    document.getElementById('sbStatus').textContent = 'running...';

    try {
        const exitCode = await wm.main(cmd);
        if (exitCode !== 0) {
            print(`(exit code: ${exitCode})`, 'amber');
        }
    } catch (e) {
        print('WASM error: ' + e.message, 'red');
    }

    mainRunning = false;
    document.getElementById('sbStatus').textContent = 'ready';
    document.getElementById('btnAddPort').disabled = false;
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    if (!('serial' in navigator)) {
        print('Web Serial API not supported — use Chrome or Edge.', 'red');
        document.getElementById('btnAddPort').disabled = true;
    }
    initWasm();
    updateMenuCounts();
});

// ═══════════════════════════════════════════════════════
// Storage — localStorage-backed collections
// ═══════════════════════════════════════════════════════

const STORE_KEY = 'wmbusmeters_data';

function loadStore() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { meters: [], commands: [], notes: [] }; }
    catch { return { meters: [], commands: [], notes: [] }; }
}
function saveStore(store) {
    localStorage.setItem(STORE_KEY, JSON.stringify(store));
    updateMenuCounts();
}
function updateMenuCounts() {
    const s = loadStore();
    document.getElementById('menuMeterCount').textContent = s.meters.length;
    document.getElementById('menuCmdCount').textContent = s.commands.length;
    document.getElementById('menuNoteCount').textContent = s.notes.length;
}

// ═══════════════════════════════════════════════════════
// Menu
// ═══════════════════════════════════════════════════════

function toggleMenu() {
    document.getElementById('menu').classList.toggle('open');
}
document.addEventListener('click', e => {
    const wrap = document.querySelector('.menu-wrap');
    if (!wrap.contains(e.target)) document.getElementById('menu').classList.remove('open');
});

// ═══════════════════════════════════════════════════════
// Dialog engine
// ═══════════════════════════════════════════════════════

let currentDialog = null;

function openDialog(type) {
    document.getElementById('menu').classList.remove('open');
    currentDialog = type;
    document.getElementById('dlgOverlay').classList.add('open');
    renderDialogList(type);
}

function closeDialog() {
    document.getElementById('dlgOverlay').classList.remove('open');
    currentDialog = null;
}

function renderDialogList(type) {
    const titles = { meters: 'Meters', commands: 'Saved Commands', notes: 'Notes' };
    document.getElementById('dlgTitle').textContent = titles[type] || type;
    const store = loadStore();
    const items = store[type] || [];

    const body = document.getElementById('dlgBody');
    const footer = document.getElementById('dlgFooter');

    if (items.length === 0) {
        body.innerHTML = '<div class="empty-state">No ' + type + ' saved yet.</div>';
    } else {
        body.innerHTML = items.map((item, i) => {
            const name = esc(item.name || item.label || '(unnamed)');
            const meta = esc(itemMeta(type, item));
            let actions = '';
            if (type === 'commands') actions += '<button class="btn btn-sm btn-green" onclick="runSavedCommand(' + i + ')" title="Run">▸</button>';
            if (type === 'meters') actions += '<button class="btn btn-sm btn-green" onclick="useMeter(' + i + ')" title="Use in command">▸</button>';
            actions += '<button class="btn btn-sm" onclick="editItem(\'' + type + '\',' + i + ')" title="Edit">✎</button>';
            actions += '<button class="btn btn-sm btn-red" onclick="deleteItem(\'' + type + '\',' + i + ')" title="Delete">×</button>';
            return '<div class="item-card"><div class="item-info"><div class="item-name">' + name + '</div><div class="item-meta">' + meta + '</div></div><div class="item-actions">' + actions + '</div></div>';
        }).join('');
    }

    footer.innerHTML = '<button class="btn btn-green" onclick="editItem(\'' + type + '\',-1)">+ Add</button>';
}

function itemMeta(type, item) {
    if (type === 'meters') return [item.driver, item.id, item.key ? '🔑' : ''].filter(Boolean).join(' · ');
    if (type === 'commands') return item.command || '';
    if (type === 'notes') return (item.text || '').substring(0, 80);
    return '';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════════════════
// Item edit forms
// ═══════════════════════════════════════════════════════

function editItem(type, idx) {
    const store = loadStore();
    const items = store[type] || [];
    const item = idx >= 0 ? items[idx] : {};
    const isNew = idx < 0;
    const singular = { meters:'Meter', commands:'Command', notes:'Note' }[type];

    document.getElementById('dlgTitle').textContent = (isNew ? 'Add ' : 'Edit ') + singular;
    const body = document.getElementById('dlgBody');
    const footer = document.getElementById('dlgFooter');

    if (type === 'meters') {
        body.innerHTML =
            '<div class="field"><label>Name</label><input id="f_name" value="' + esc(item.name||'') + '" placeholder="e.g. Kitchen Water" /></div>' +
            '<div class="field-row"><div class="field"><label>Driver</label><input id="f_driver" value="' + esc(item.driver||'') + '" placeholder="e.g. multical21" /></div>' +
            '<div class="field"><label>ID</label><input id="f_id" value="' + esc(item.id||'') + '" placeholder="e.g. 12345678" /></div></div>' +
            '<div class="field"><label>Key</label><input id="f_key" value="' + esc(item.key||'') + '" placeholder="hex key (optional)" /></div>' +
            '<div class="field"><label>Notes</label><textarea id="f_notes" rows="2">' + esc(item.notes||'') + '</textarea></div>';
    } else if (type === 'commands') {
        body.innerHTML =
            '<div class="field"><label>Label</label><input id="f_label" value="' + esc(item.label||'') + '" placeholder="e.g. Listen T1" /></div>' +
            '<div class="field"><label>Command</label><input id="f_command" value="' + esc(item.command||'') + '" placeholder="e.g. auto:t1" /></div>' +
            '<div class="field"><label>Notes</label><textarea id="f_notes" rows="2">' + esc(item.notes||'') + '</textarea></div>';
    } else if (type === 'notes') {
        body.innerHTML =
            '<div class="field"><label>Title</label><input id="f_name" value="' + esc(item.name||'') + '" placeholder="e.g. Site notes" /></div>' +
            '<div class="field"><label>Text</label><textarea id="f_text" rows="6">' + esc(item.text||'') + '</textarea></div>';
    }

    footer.innerHTML =
        '<button class="btn" onclick="renderDialogList(\'' + type + '\')">Cancel</button>' +
        '<button class="btn btn-green" onclick="saveItem(\'' + type + '\',' + idx + ')">Save</button>';
}

function saveItem(type, idx) {
    const store = loadStore();
    let item = {};

    if (type === 'meters') {
        item = {
            name:   document.getElementById('f_name').value.trim(),
            driver: document.getElementById('f_driver').value.trim(),
            id:     document.getElementById('f_id').value.trim(),
            key:    document.getElementById('f_key').value.trim(),
            notes:  document.getElementById('f_notes').value.trim(),
        };
        if (!item.name && !item.id) { alert('Please provide a name or ID.'); return; }
    } else if (type === 'commands') {
        item = {
            label:   document.getElementById('f_label').value.trim(),
            command: document.getElementById('f_command').value.trim(),
            notes:   document.getElementById('f_notes').value.trim(),
        };
        if (!item.command) { alert('Please provide a command.'); return; }
    } else if (type === 'notes') {
        item = {
            name: document.getElementById('f_name').value.trim(),
            text: document.getElementById('f_text').value.trim(),
        };
        if (!item.text) { alert('Please provide some text.'); return; }
    }

    if (idx >= 0) store[type][idx] = item;
    else store[type].push(item);
    saveStore(store);
    renderDialogList(type);
}

function deleteItem(type, idx) {
    if (!confirm('Delete this item?')) return;
    const store = loadStore();
    store[type].splice(idx, 1);
    saveStore(store);
    renderDialogList(type);
}

// ═══════════════════════════════════════════════════════
// Actions from stored items
// ═══════════════════════════════════════════════════════

function runSavedCommand(idx) {
    const store = loadStore();
    const cmd = store.commands[idx];
    if (!cmd || !cmd.command) return;
    closeDialog();
    document.getElementById('input').value = cmd.command;
    document.getElementById('input').focus();
}

function useMeter(idx) {
    const store = loadStore();
    const m = store.meters[idx];
    if (!m) return;
    const parts = [m.name || 'MyMeter', m.driver || 'auto', m.id || '00000000'];
    if (m.key) parts.push(m.key);
    closeDialog();
    const input = document.getElementById('input');
    if (input.value.trim()) {
        input.value = input.value.trim() + ' ' + parts.join(' ');
    } else {
        input.value = 'auto:t1 ' + parts.join(' ');
    }
    input.focus();
}

// ═══════════════════════════════════════════════════════
// Export / Import
// ═══════════════════════════════════════════════════════

function exportAll() {
    document.getElementById('menu').classList.remove('open');
    const store = loadStore();
    const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'wmbusmeters-config.json'; a.click();
    URL.revokeObjectURL(url);
    print('Config exported.', 'dim');
}

function importAll() {
    document.getElementById('menu').classList.remove('open');
    document.getElementById('importFile').click();
}

function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            const store = loadStore();
            if (data.meters) store.meters.push(...data.meters);
            if (data.commands) store.commands.push(...data.commands);
            if (data.notes) store.notes.push(...data.notes);
            saveStore(store);
            print('Imported: ' + (data.meters||[]).length + ' meters, ' + (data.commands||[]).length + ' commands, ' + (data.notes||[]).length + ' notes.', 'green');
        } catch (err) {
            print('Import failed: ' + err.message, 'red');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}
</script>
